services:
  - type: web
    name: jaffa-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jaffa-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: jaffa-db
    databaseName: jaffa_db
    user: jaffa_user
    plan: free
